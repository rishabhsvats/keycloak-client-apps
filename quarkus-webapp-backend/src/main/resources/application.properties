# OIDC web-app (authorization code flow) - for use with Angular/React/JS frontends
quarkus.oidc.application-type=web-app
quarkus.oidc.auth-server-url=${KEYCLOAK_URL:http://localhost:8080/realms/master}
quarkus.oidc.client-id=${KEYCLOAK_CLIENT_ID:quarkus-webapp}
quarkus.oidc.credentials.secret=${KEYCLOAK_CLIENT_SECRET:secret}

# Fixed redirect path so Keycloak redirect_uri is stable (register this in Keycloak)
quarkus.oidc.authentication.redirect-path=/api/auth/callback
# Restore original URL after redirect (e.g. /api/auth/login -> callback -> back to /api/auth/login)
quarkus.oidc.authentication.restore-path-after-redirect=true

# Public paths (no authentication)
quarkus.http.auth.permission.public.paths=/api/public/*
quarkus.http.auth.permission.public.policy=permit

# Callback: must be permit so OIDC can exchange the code (no session yet)
quarkus.http.auth.permission.callback.paths=/api/auth/callback
quarkus.http.auth.permission.callback.policy=permit

# Login: require auth so unauthenticated users are redirected to Keycloak
quarkus.http.auth.permission.login.paths=/api/auth/login
quarkus.http.auth.permission.login.policy=authenticated

# Logout (RP-initiated logout)
quarkus.http.auth.permission.logout.paths=/api/auth/logout
quarkus.http.auth.permission.logout.policy=authenticated

# Server
quarkus.http.port=8083

# CORS: allow SPA origins with credentials (cookie-based session)
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:4200,http://localhost:5173,http://localhost:5174
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,origin
quarkus.http.cors.exposed-headers=
quarkus.http.cors.access-control-max-age=24H
quarkus.http.cors.access-control-allow-credentials=true
