# Keycloak / OIDC
quarkus.oidc.auth-server-url=${KEYCLOAK_URL:http://localhost:8080/realms/master}
quarkus.oidc.client-id=${KEYCLOAK_CLIENT_ID:quarkus-backend}
# Bearer-only: no client secret; only validates tokens
quarkus.oidc.application-type=service

# Public paths (no authentication)
quarkus.http.auth.permission.public.paths=/api/public/*
quarkus.http.auth.permission.public.policy=permit

# Secured paths require authentication (default for OIDC)
# Optional: restrict admin by role in the resource with @RolesAllowed

# Server
quarkus.http.port=3001
